<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style/style.css">
</head>

<body>

    <!-- navbar  -->

    <div class="navbar bg-base-100 shadow-sm">
        <div class="flex flex-1 items-center">
            <img class="w-6 h-7" src="./assets/github-logo.png" alt="">
            <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
            <input type="text" placeholder="Search issues" class="input input-bordered w-24 md:w-auto" />
            <div class="dropdown dropdown-end">
                <button id="login-btn" class="btn w-full py-2 text-white rounded bg-indigo-700"><i
                        class="fa-solid fa-plus"></i>
                    New Issue
                </button>
            </div>
        </div>
    </div>


    <section class="mt-15 w-11/12 mx-auto">

        <!-- Tab sections  -->
        <div class="gap-2">
            <button class="btn w-20 py-2 text-white rounded bg-indigo-700">All</button>
            <button class="btn w-20">Open</button>
            <button class="btn w-20">Closed</button>
        </div>

        <!-- card sections  -->
        <div class="mt-7 flex justify-between">
            <div class="flex items-center gap-3">
                <img class="w-8 h-8" src="./assets/Aperture.png" alt="">
                <div>
                    <p class="font-bold">50 Issues</p>
                    <p class="text-gray-500">Track and manage your project issues</p>
                </div>

            </div>
            <div class="flex gap-3">
                <div class="flex items-center justify-center gap-1">
                    <div class="border border-none rounded-[50%] w-2 h-2 bg-[#00A96E]"></div>
                    <p>Open</p>
                </div>
                <div class="flex items-center justify-center gap-1">
                    <div class="border border-none rounded-[50%] w-2 h-2 bg-[#A855F7]"></div>
                    <p>Closed</p>
                </div>
                
            </div>
        </div>
    </section>
</body>

</html>
