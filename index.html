<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style/style.css">
</head>

<body>

    <div class="flex items-center justify-center">

        <div class="bg-gray-100 w-96 p-8 rounded-xl mt-15 shadow">

            <div class="flex justify-center mb-4">
                <img src="./assets/github-logo.png" class="w-16">
            </div>

            <h1 class="text-xl font-bold text-center">GitHub Issues Tracker</h1>
            <p class="text-center text-gray-500 mb-6">Sign in to manage issues</p>

            <label class="text-sm">Username</label>
            <input id="input-username" class="border-none w-full p-2 rounded mb-3" type="text" placeholder="Enter Username">

            <p class="text-xs text-indigo-700 mb-2">Default: admin</p>

            <label class="text-sm">Password</label>
            <input id="input-pin" type="password" class="border-none w-full p-2 rounded mb-3" placeholder="Enter Password">

            <p class="text-xs text-indigo-700 mb-4">Default: admin123</p>

            <button id="login-btn" class="btn w-full py-2 text-white rounded-xl bg-indigo-700">
                Sign In
            </button>

            <div class="text-center my-4 text-gray-700">OR</div>

            <div class="text-center my-4 text-gray-500">Demo Credentials</div>



            <div class="p-3 rounded text-sm text-center">
                <p><span class="font-bold">Username:</span> admin</p>
                <p><span class="font-bold">Password:</span> admin123</p>
            </div>

        </div>

    </div>
    
    <script src="./script/login.js"></script>

</body>

</html>
